<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=8, user-scalable=yes" />
<title>Hmob0.2 - H.A.N.K. Mobile</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020205;color:#f4f7ff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}#loading{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 30% 18%,rgba(125,211,252,.18),transparent 35%),#020205;color:#7dd3fc;font-weight:900;letter-spacing:.08em;text-transform:uppercase;z-index:9}.fail{max-width:720px;padding:24px;line-height:1.45;color:#dbeafe}.fail code{color:#f8fafc;background:#111827;padding:2px 6px;border-radius:6px}</style>
</head>
<body>
<div id="loading">Loading Hmob0.2…</div>
<script>
const SOURCE='https://raw.githubusercontent.com/dee-elder-millenial/HandyAtomicNuclideKindathingy/main2/index.html';
const MOBILE_PATCH=String.raw`
<script>
(function(){
function ready(fn){if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',fn,{once:true});else fn()}
ready(function(){
  const top=document.getElementById('top'),info=document.getElementById('info'),map=document.getElementById('bottom'),h1=top&&top.querySelector('h1');
  if(!top||!info||!map||!h1)return;
  const style=document.createElement('style');
  style.textContent=String.raw`
  :root{--topH:58px!important;--bottomH:0px!important;--gap:10px!important}
  html,body{overscroll-behavior:none!important}
  #top{left:0!important;right:0!important;top:0!important;z-index:30!important;max-height:70vh!important;padding:calc(env(safe-area-inset-top,0px) + 8px) 10px 10px!important;transition:max-height .22s ease,background .22s ease,box-shadow .22s ease;border-bottom:1px solid rgba(125,211,252,.28)!important;box-shadow:0 18px 42px rgba(0,0,0,.38)!important}
  #top h1{font-size:15px!important;width:100%!important;margin:0!important;padding:2px 92px 6px 2px!important;line-height:1.2;letter-spacing:.03em;cursor:pointer;position:relative;user-select:none}
  #top h1::after{content:'Controls ▲';position:absolute;right:0;top:2px;color:#7dd3fc;font-size:11px;font-weight:900;letter-spacing:.02em;text-transform:none}
  #top.hmob-collapsed{max-height:58px!important;overflow:hidden!important;background:linear-gradient(180deg,rgba(2,2,5,.98),rgba(2,2,5,.68))!important;box-shadow:0 10px 28px rgba(0,0,0,.25)!important}
  #top.hmob-collapsed h1::after{content:'Controls ▼'}
  #top.hmob-collapsed>:not(h1){display:none!important}
  #hud{display:none!important}
  #info{z-index:20!important;left:12px!important;right:12px!important;bottom:86px!important;top:auto!important;width:auto!important;max-width:none!important;max-height:34vh!important;padding:12px 14px!important;border-radius:20px!important;box-shadow:0 18px 42px rgba(0,0,0,.45)!important}
  #bottom{z-index:20!important;right:12px!important;left:12px!important;bottom:86px!important;width:auto!important;max-width:none!important;padding:10px!important;border-radius:20px!important;box-shadow:0 18px 42px rgba(0,0,0,.45)!important}
  #miniMap{width:100%!important;height:34vh!important;max-height:260px!important;min-height:170px!important}
  #info.hmob-hidden,#bottom.hmob-hidden{display:none!important}
  .hmob-fabbar{position:fixed;right:calc(env(safe-area-inset-right,0px) + 14px);bottom:calc(env(safe-area-inset-bottom,0px) + 14px);z-index:40;display:flex;gap:10px;align-items:center}
  .hmob-fabbar button{min-width:58px;height:52px;border-radius:18px;background:rgba(17,24,39,.92);border:1px solid #334155;color:#f4f7ff;font-size:13px;font-weight:900;box-shadow:0 10px 28px rgba(0,0,0,.45);backdrop-filter:blur(10px)}
  .hmob-fabbar button.active{border-color:#7dd3fc!important;box-shadow:0 0 0 1px rgba(125,211,252,.35) inset,0 10px 28px rgba(0,0,0,.45)!important;color:#7dd3fc!important}
  @media(max-width:520px){#top{gap:6px!important}#top button,#top select{padding:6px 8px!important;font-size:14px!important}#top label{font-size:12px!important}#top .group{width:100%!important}#info h2{font-size:28px!important}.detail{grid-template-columns:96px 1fr!important}.hmob-fabbar button{min-width:54px;height:50px}}
  `;
  document.head.appendChild(style);
  const bar=document.createElement('div');
  bar.className='hmob-fabbar';
  bar.innerHTML='<button id="hmobInfo" type="button">Info</button><button id="hmobMap" type="button">Map</button>';
  document.body.appendChild(bar);
  const infoBtn=document.getElementById('hmobInfo'),mapBtn=document.getElementById('hmobMap');
  function setVars(){if(window.setPanelVars)window.setPanelVars();if(window.resizeMiniMap)window.resizeMiniMap()}
  function refresh(){infoBtn.classList.toggle('active',!info.classList.contains('hmob-hidden'));mapBtn.classList.toggle('active',!map.classList.contains('hmob-hidden'));setVars()}
  function hideInfo(){info.classList.add('hmob-hidden')}
  function hideMap(){map.classList.add('hmob-hidden')}
  top.classList.add('hmob-collapsed');hideInfo();hideMap();
  h1.addEventListener('click',e=>{e.stopPropagation();top.classList.toggle('hmob-collapsed');refresh()});
  top.addEventListener('click',e=>{if(top.classList.contains('hmob-collapsed')){e.stopPropagation();top.classList.remove('hmob-collapsed');refresh()}});
  infoBtn.addEventListener('click',e=>{e.stopPropagation();info.classList.toggle('hmob-hidden');if(!info.classList.contains('hmob-hidden'))hideMap();refresh()});
  mapBtn.addEventListener('click',e=>{e.stopPropagation();map.classList.toggle('hmob-hidden');if(!map.classList.contains('hmob-hidden'))hideInfo();refresh()});
  window.addEventListener('resize',()=>setTimeout(refresh,40));
  setTimeout(refresh,80);
});
})();
<\/script>`;
async function boot(){
  try{
    const res=await fetch(SOURCE,{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    let html=await res.text();
    html=html.replace('<title>H.A.N.K. - Handy Atomic Nuclide Kindathingy</title>','<title>Hmob0.2 - H.A.N.K. Mobile</title>');
    html=html.replace('</body>',MOBILE_PATCH+'\n</body>');
    document.open();document.write(html);document.close();
  }catch(err){
    document.getElementById('loading').innerHTML='<div class="fail"><h1>Hmob0.2 could not load H.A.N.K.</h1><p>The mobile shell tried to fetch the main H.A.N.K. page and failed.</p><p><code>'+String(err).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))+'</code></p></div>';
  }
}
boot();
</script>
</body>
</html>
